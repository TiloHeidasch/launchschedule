<div>
  <app-notification-icon
    type="spacestation"
    [id]="spacestation.id"
  ></app-notification-icon>
  @if (spacestation) {
    <ion-card
      routerDirection="forward"
      [routerLink]="['/spacestation/' + spacestation.id]"
      >
      <div id="image">
        <div class="image-wrapper">
          <ion-img
            id="background"
          [src]="placeholderService.resolveImage(spacestation.image, spacestation.image_url)"
            >
          </ion-img>
        </div>
        <div class="image-wrapper">
          <ion-img
            id="foreground"
          [src]="placeholderService.resolveImage(spacestation.image, spacestation.image_url)"
            >
          </ion-img>
        </div>
      </div>
      <ion-card-header>
        <ion-card-subtitle>{{ subtitle }}</ion-card-subtitle>
        <ion-card-title>{{ title }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div id="content">
          <p id="founded">*{{ spacestation.founded }}</p>
          @if (spacestation.deorbited !== null) {
            <p id="deorbited">
              †{{ spacestation.deorbited }}
            </p>
          }
        </div>
      </ion-card-content>
    </ion-card>
  }
</div>
