<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button color="primary" defaultHref="agency"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ title }}</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-refresher slot="fixed" (ionRefresh)="load($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  @if (agency!==undefined) {
    <div id="container">
      <div id="agency">
        <app-agency-detail-card [agency]="agency"></app-agency-detail-card>
      </div>
      <div id="rocket-list">
        @for (rocket of agency.launcher_list; track rocket) {
          <app-rocket-list-entry
            [rocket]="rocket"
          ></app-rocket-list-entry>
        }
      </div>
      <div id="spacecraft-list">
        @for (spacecraft of agency.spacecraft_list; track spacecraft) {
          <app-spacecraft-list-entry
            [spacecraft]="spacecraft"
            >
          </app-spacecraft-list-entry>
        }
      </div>
      <!-- <div id="location">
      <app-location-detail-card [location]='agency.location'></app-location-detail-card>
    </div>
    <div id="agency">
      <app-agency-detail-card [agency]='agency.lsp'></app-agency-detail-card>
    </div> -->
  </div>
}
</ion-content>
