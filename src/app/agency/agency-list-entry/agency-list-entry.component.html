@if (agency!==undefined) {
  <app-notification-icon type="agency" [id]="agency.id"></app-notification-icon>
}
@if (agency !== undefined) {
  <ion-card
    routerDirection="forward"
    [routerLink]="['/agency/' + agency.id]"
    >
    <div id="image">
      <div class="image-wrapper">
        <ion-img
          id="background"
          [src]="placeholderService.resolveImage(agency.image, agency.image_url)"
        ></ion-img>
      </div>
      <div class="image-wrapper">
        <ion-img
          id="foreground"
          [src]="placeholderService.resolveImage(agency.logo, agency.logo_url)"
        ></ion-img>
      </div>
    </div>
    <ion-card-header>
      <ion-card-subtitle>{{ subtitle }}</ion-card-subtitle>
      <ion-card-title>{{ title }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
    </ion-card-content>
  </ion-card>
}
