<ion-card>
  <ion-card-header>
    <ion-card-subtitle>Video</ion-card-subtitle>
    <ion-card-title>{{ title }}</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <p>{{ description }}</p>
    @if (id !== '0') {
      <youtube-player
        height="100%"
        width="100%"
        [videoId]="id"
      ></youtube-player>
    }
    @if (id === '0') {
      <div>
        <ion-item [href]="url">
          <ion-label>Link</ion-label>
        </ion-item>
      </div>
    }
  </ion-card-content>
</ion-card>
