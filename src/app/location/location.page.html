<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button color="primary" defaultHref="location"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ title }}</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-refresher slot="fixed" (ionRefresh)="load($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  @if (location!==undefined) {
    <div id="container">
      <div id="location">
        <app-location-detail-card
          [location]="location"
        ></app-location-detail-card>
      </div>
      <div id="pads">
        <ion-item> Pads </ion-item>
        @for (pad of location.pads; track pad) {
          <app-pad-list-entry
            [pad]="pad"
            [locationName]="location.name"
          ></app-pad-list-entry>
        }
      </div>
    </div>
  }
</ion-content>
