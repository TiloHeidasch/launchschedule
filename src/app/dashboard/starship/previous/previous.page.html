<ion-content
  #previousContent
  [scrollEvents]="true"
  (ionScroll)="logScrolling($event)"
  [fullscreen]="true"
  >
  <ion-refresher slot="fixed" (ionRefresh)="store.loadDashboard($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <ion-list>
    @for (eventLaunch of store.eventLaunchArray; track eventLaunch) {
      <div>
        @if (eventLaunch.event) {
          <app-event-list-entry [event]="eventLaunch.event"></app-event-list-entry>
        }
        @if (eventLaunch.launch) {
          <app-launch-list-entry [launch]="eventLaunch.launch"></app-launch-list-entry>
        }
      </div>
    }
  </ion-list>
</ion-content>
