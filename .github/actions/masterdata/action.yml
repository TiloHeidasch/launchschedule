name: Download Masterdata
description: Populate src/app/data/ from the masterdata branch
runs:
  using: composite
  steps:
    - name: Checkout masterdata
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository }}
        ref: masterdata
        path: _masterdata
    - name: Copy data
      shell: bash
      run: |
        mkdir -p src/app/data
        cp _masterdata/*.json src/app/data/ 2>/dev/null || true
        rm -f src/app/data/*[0-9]*.json 2>/dev/null || true
        rm -rf _masterdata
