name: Fetch Spacecrafts

on:
#  schedule:
    # * is a special character in YAML so you have to quote this string
#    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  fetchSpacecrafts1:
    name: Fetch Spacecrafts 0-500
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
      - name: Fetch Spacecrafts
        run: node scripts/masterdata/fetch.ts config/spacecraft spacecrafts 0 500
      - name: Safe Data Artifact
        uses: actions/upload-artifact@v7
        with:
          name: spacecrafts1
          path: src/app/data/
  commit:
    name: Commit Master Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [fetchSpacecrafts1]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: masterdata
      - name: Download Spacecrafts 0-500
        uses: actions/download-artifact@v8
        with:
          name: spacecrafts1
          path: ./
      - name: Push to Masterdata branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Updates Spacecrafts" || echo "No changes to commit"
          git push origin masterdata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
