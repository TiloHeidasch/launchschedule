name: Fetch Spacestations

on:
#  schedule:
    # * is a special character in YAML so you have to quote this string
#    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  fetchSpacestations1:
    name: Fetch Spacestations 0-500
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
      - name: Fetch Spacestations
        run: node scripts/masterdata/fetch.ts spacestation spacestations 0 500
      - name: Safe Data Artifact
        uses: actions/upload-artifact@v7
        with:
          name: spacestations1
          path: src/app/data/
  commit:
    name: Commit Master Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [
        fetchSpacestations1,
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: masterdata
      - name: Download Spacestations 0-500
        uses: actions/download-artifact@v8
        with:
          name: spacestations1
          path: ./
      - name: Push to Masterdata branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m 'Updates Spacestations' || echo "No changes to commit"
          git push origin masterdata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
