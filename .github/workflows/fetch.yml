name: Fetch Masterdata

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  plan:
    name: Plan chunks
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      merges: ${{ steps.plan.outputs.merges }}
      entities: ${{ steps.plan.outputs.entities }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: plan
        run: node scripts/masterdata/plan.js

  fetch:
    name: Fetch ${{ matrix.entity }} (${{ matrix.offset }})
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch chunk
        run: node ${{ matrix.script }} ${{ matrix.args }} ${{ matrix.offset }} 500
      - name: Upload chunk
        uses: actions/upload-artifact@v4
        with:
          name: md-${{ matrix.entity }}-${{ matrix.offset }}
          path: src/app/data/
          if-no-files-found: error
          retention-days: 1

  commit:
    name: Merge & commit
    needs: [plan, fetch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: masterdata
      - uses: actions/download-artifact@v4
        with:
          pattern: md-*
          path: src/app/data/
          merge-multiple: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Merge chunks
        env:
          MERGES: ${{ needs.plan.outputs.merges }}
        run: node -e 'const m=JSON.parse(process.env.MERGES);const {execSync}=require("child_process");for(const c of Object.values(m))execSync(c,{stdio:"inherit"});'
      - name: Push to masterdata
        env:
          ENTITIES: ${{ needs.plan.outputs.entities }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e 'JSON.parse(process.env.ENTITIES).forEach(e=>console.log(e))' | while read e; do
            rm -f "src/app/data/${e}"[0-9]*.json
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/app/data/
          if git commit -m "Update masterdata"; then
            git push origin masterdata
          else
            echo "No changes to commit"
          fi
