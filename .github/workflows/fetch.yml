name: Fetch Masterdata

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  plan:
    name: Plan chunks
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      merges: ${{ steps.plan.outputs.merges }}
      entities: ${{ steps.plan.outputs.entities }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - id: plan
        run: node scripts/masterdata/plan.js

  fetch:
    name: Fetch ${{ matrix.entity }} (${{ matrix.offset }})
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Fetch chunk
        run: node ${{ matrix.script }} ${{ matrix.args }} ${{ matrix.offset }} 500
      - name: Upload chunk
        uses: actions/upload-artifact@v7.0.1
        with:
          name: md-${{ matrix.entity }}-${{ matrix.offset }}
          path: src/app/data/
          if-no-files-found: error
          retention-days: 1

  commit:
    name: Merge & commit
    needs: [plan, fetch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: md-*
          path: src/app/data/
          merge-multiple: true
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Merge chunks
        env:
          MERGES: ${{ needs.plan.outputs.merges }}
        run: node -e 'const m=JSON.parse(process.env.MERGES);const {execSync}=require("child_process");for(const c of Object.values(m))execSync(c,{stdio:"inherit"});'
      - name: Push to masterdata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch masterdata "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" _md
          cp src/app/data/*.json _md/ 2>/dev/null || true
          rm -f _md/*[0-9]*.json 2>/dev/null || true
          cd _md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          if git commit -m "Update masterdata"; then
            git push
          else
            echo "No changes to commit"
          fi
