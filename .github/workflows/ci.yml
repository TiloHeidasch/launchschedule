name: Lint, Test, Build, Deploy

on:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - uses: ./.github/actions/masterdata
      - run: npm run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - uses: ./.github/actions/masterdata
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - uses: ./.github/actions/masterdata
      - name: Setup Ionic CLI & Totemize
        run: npm install --legacy-peer-deps @ionic/cli@^7.2.1 totemize@0.0.1
      - name: Determine Release Name & Track
        id: release
        run: |
          TRACK=development
          NAME=development
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TRACK=Prod
            NAME=$(npx ts-node -P scripts/tsconfig.json scripts/totemizeProd.ts)
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            TRACK=Beta
            NAME=$(npx ts-node -P scripts/tsconfig.json scripts/totemizeBeta.ts)
          fi
          echo "track=$TRACK" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      - name: Inject Release Metadata
        run: npx ts-node -P scripts/tsconfig.json scripts/setRelease.ts ${{ github.run_number }} "${{ steps.release.outputs.name }}" "${{ steps.release.outputs.track }}"
      - run: npm run build:prod
      - uses: actions/upload-artifact@v4
        with:
          name: www
          path: www/

  pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, test, e2e]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: www
          path: www/
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: www/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
