name: Lint, Test, Build, Deploy

on:
  # schedule:
    # * is a special character in YAML so you have to quote this string
  #  - cron: '08 15 */7 * *'
  #push:
  workflow_dispatch:

jobs:
  baptize:
    name: Determine Release Name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
      - name: Setup Totemize
        if: ${{github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'}}
        run: npm install --save totemize ts-node typescript --legacy-peer-deps
      - name: Write Development to File
        run: echo "development " > version
      - name: Create Prod Release Name Variable using Totemize
        if: ${{github.ref == 'refs/heads/master'}}
        run: npx ts-node -P scripts/tsconfig.json scripts/totemizeProd.ts > version
      - name: Create Beta Release Name Variable using Totemize
        if: ${{github.ref == 'refs/heads/dev'}}
        run: npx ts-node -P scripts/tsconfig.json scripts/totemizeBeta.ts > version
      - name: Clean version File
        run: sed -i '$ s/.$//' version
      - name: Safe Version File Artifact
        uses: actions/upload-artifact@v7
        with:
          name: version
          path: ./version
  track:
    name: Determine current Track
    runs-on: ubuntu-latest
    steps:
      - name: Write Track to File
        run: echo "development" > track
      - name: Check if master
        if: ${{github.ref == 'refs/heads/master'}}
        run: echo "Prod" > track
      - name: Check if dev
        if: ${{github.ref == 'refs/heads/dev'}}
        run: echo "Beta" > track
      - name: Safe Track File Artifact
        uses: actions/upload-artifact@v7
        with:
          name: track
          path: ./track
  build:
    name: Build Web
    runs-on: ubuntu-latest
    needs:
      [ baptize,
        track,
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
      - name: NPM Install
        run: npm ci --legacy-peer-deps
      - name: Setup Angular
        run: npm install @angular/cli --legacy-peer-deps
      - name: Setup Ionic
        run: npm install @ionic/cli --legacy-peer-deps
      - name: Download Version
        uses: actions/download-artifact@v8
        with:
          name: version
          path: ./
      - name: Set Release Name Variable
        run: echo "RELEASE_NAME=`cat ./version`" >> $GITHUB_ENV
      - name: Download Track
        uses: actions/download-artifact@v8
        with:
          name: track
          path: ./
      - name: Set Release Track Variable
        run: echo "RELEASE_TRACK=`cat ./track`" >> $GITHUB_ENV
      - name: Setup Environment File
        run: sed -i '/versionCode:/d; /versionName:/d; /track:/d; s/};/versionCode:${{ github.run_number }},\n versionName:"${{ env.RELEASE_NAME }}",\n track:"${{ env.RELEASE_TRACK }}"\n};/' src/environments/environment.prod.ts
      - name: Check Environment File
        run: cat src/environments/environment.prod.ts
      - name: Download Masterdata
        run: wget https://github.com/TiloHeidasch/launchschedule/archive/refs/heads/masterdata.zip
      - name: Unzip Masterdata
        run: unzip -qq ./masterdata.zip -d ./src/app/data/
      - name: Copy Masterdata
        run: sudo cp ./src/app/data/launchschedule-masterdata/* ./src/app/data/
      - name: Build with Ionic
        run: npm run build:prod
      - name: tar www Artifact
        run: tar -cvf www.tar www/
      - name: Safe www Artifact
        uses: actions/upload-artifact@v7
        with:
          name: www
          path: www.tar
  pages:
    name: Create Github Page
    runs-on: ubuntu-latest
    needs: [build, test, e2e]
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Download www
      uses: actions/download-artifact@v8
      with:
        name: www
        path: ./
    - name: Untar www
      run: tar -xvf www.tar
    - name: Check Basepath in index.html
      run: cat www/index.html
    - name: Change Basepath in index.html
      run: sed -i 's/<base href="\/">/<base href="\/launchschedule\/">/g' www/index.html
    - name: Check Basepath in index.html
      run: cat www/index.html
    - name: GitHub Pages
      uses: crazy-max/ghaction-github-pages@v5
      with:
        build_dir: www/
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
      - name: NPM Install
        run: npm ci --legacy-peer-deps
      - name: Setup Angular
        run: npm install @angular/cli --legacy-peer-deps
      - name: Setup Ionic
        run: npm install @ionic/cli --legacy-peer-deps
      - name: Run Lint
        run: npm run lint
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs:
      [baptize, track]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
      - name: NPM Install
        run: npm ci --legacy-peer-deps
      - name: Setup Angular
        run: npm install @angular/cli --legacy-peer-deps
      - name: Setup Ionic
        run: npm install @ionic/cli --legacy-peer-deps
      - name: Download Masterdata
        run: wget https://github.com/TiloHeidasch/launchschedule/archive/refs/heads/masterdata.zip
      - name: Unzip Masterdata
        run: unzip -qq ./masterdata.zip -d ./src/app/data/
      - name: Copy Masterdata
        run: sudo cp ./src/app/data/launchschedule-masterdata/* ./src/app/data/
      - name: Run Test
        run: npm run test
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs:
      [baptize, track]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
      - name: NPM Install
        run: npm ci --legacy-peer-deps
      - name: Setup Angular
        run: npm install @angular/cli --legacy-peer-deps
      - name: Setup Ionic
        run: npm install @ionic/cli --legacy-peer-deps
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Download Masterdata
        run: wget https://github.com/TiloHeidasch/launchschedule/archive/refs/heads/masterdata.zip
      - name: Unzip Masterdata
        run: unzip -qq ./masterdata.zip -d ./src/app/data/
      - name: Copy Masterdata
        run: sudo cp ./src/app/data/launchschedule-masterdata/* ./src/app/data/
      - name: Run E2E
        run: npm run e2e
      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
